name: Matrix job
on: push
jobs:
  build:
    strategy:
      matrix:
        node-veriosns: [12, 14, 16]
        operating-system: [ubuntu-lates, windows-latest]
        include:
          - node-version: 18
            operating-system: windows-latest
        exclude:
          - node-version: 12
            operating-system: ubuntu-latest
    runs-on: ${{ matrix.operating-system }}
    steps:
      - name: Get code  
        uses: actions/checkout@v3
      - name: Get node js 
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-veriosns }}
      - name: install dependencies  
        run: npm run install
      - name: buils project
        run: npm run build